<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ulsabox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } * { box-sizing: border-box; }</style>
</head>
<body class="bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-100 min-h-screen p-6">

  <div class="max-w-5xl mx-auto">

    <!-- NAVBAR -->
    <div class="bg-white rounded-2xl shadow px-6 py-4 flex justify-between items-center mb-6">
      <div class="flex items-center gap-2">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" class="w-6 h-6">
        <span class="font-bold text-gray-800 text-lg">Ulsabox</span>
      </div>
      <div class="flex items-center gap-3">
        <span id="user-email" class="text-sm text-gray-500">Cargando...</span>
        <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-gray-500">👤</div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="bg-white rounded-2xl shadow p-6 mb-6">

      <!-- HEADER -->
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">Hola, <span id="user-name">Usuario</span></h2>
          <p class="text-sm text-gray-400 mt-1">Mantén tu bandeja de entrada limpia y organizada.</p>
        </div>
        <div class="flex flex-col gap-2">
          <button onclick="analyzeEmails()" class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            📩 Analizar Correos ⚡
          </button>
          <button onclick="cleanPromotions()" class="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
            🧹 Limpiar Promociones
          </button>
        </div>
      </div>

      <!-- STATS -->
      <div class="grid grid-cols-3 gap-4 mb-2">
        <div class="flex items-center gap-3 p-4 bg-blue-50 rounded-xl">
          <span class="text-blue-500 text-2xl">📧</span>
          <div>
            <p class="text-xs text-gray-400">Correos</p>
            <h3 id="total" class="text-2xl font-bold text-gray-800">0</h3>
          </div>
        </div>
        <div class="flex items-center gap-3 p-4 bg-green-50 rounded-xl">
          <span class="text-green-500 text-2xl">⭐</span>
          <div>
            <p class="text-xs text-gray-400">Importantes</p>
            <h3 id="important" class="text-2xl font-bold text-gray-800">0</h3>
          </div>
        </div>
        <div class="flex items-center gap-3 p-4 bg-red-50 rounded-xl">
          <span class="text-red-500 text-2xl">🗑️</span>
          <div>
            <p class="text-xs text-gray-400">Promociones</p>
            <h3 id="deleted" class="text-2xl font-bold text-gray-800">0</h3>
          </div>
        </div>
      </div>

      <p class="text-xs text-gray-400 mb-6">Última ejecución: hace 1 hora</p>

      <!-- MAIN GRID -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-gray-50 p-5 rounded-xl">
          <h3 class="font-semibold text-gray-700 text-sm mb-4">Resumen de Correos</h3>
          <canvas id="chart"></canvas>
        </div>
        <div class="bg-gray-50 p-5 rounded-xl">
          <h3 class="font-semibold text-gray-700 text-sm mb-4">Top Remitentes</h3>
          <div id="remitentes-container"></div>
        </div>
      </div>
    </div>

    <!-- ACTIVIDAD RECIENTE -->
    <div class="bg-white rounded-2xl shadow p-6">
      <h3 class="font-semibold text-gray-700 mb-4">Actividad Reciente</h3>
      <ul id="activity" class="space-y-2"></ul>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
